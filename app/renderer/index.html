<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NicoBot</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app-shell">
      <header class="topbar">
        <div class="brand-left">
          <div class="app-icon">L</div>
          <div>
            <h1>Warp</h1>
            <p class="subtitle">NicoBot voice companion</p>
          </div>
        </div>
        <div class="brand-right">Spokenly</div>
      </header>

      <section class="widget panel" id="floatingWidget">
        <div class="widget-head">
          <span id="statePill" class="pill idle">idle</span>
          <div class="hotkey-wrap">
            <label for="hotkeySelect">Hotkey</label>
            <select id="hotkeySelect">
              <option value="F7">F7</option>
              <option value="F8">F8</option>
              <option value="CommandOrControl+Shift+Space">Ctrl/Cmd+Shift+Space</option>
            </select>
            <button id="setHotkeyBtn" class="btn ghost small">Apply</button>
          </div>
        </div>

        <button id="recordBtn" class="toggle-btn" title="Toggle recording">
          <span id="toggleLabel">Toggle recording</span>
        </button>

        <div class="dots" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
      </section>

      <section class="grid collapsed" id="conversationPanel">
        <article class="panel panel-main">
          <h2>Transcription Display</h2>
          <div class="text-block">
            <h3>Your speech (Spanish)</h3>
            <p id="transcriptEs" class="text-output empty">No transcript yet.</p>
          </div>
          <div class="text-block">
            <h3>Assistant speech text (English)</h3>
            <p id="translatedEn" class="text-output empty">No translated text yet.</p>
          </div>
        </article>

        <aside class="panel panel-side">
          <div class="side-actions">
            <button id="restartBtn" class="btn ghost">Restart Backend</button>
          </div>
          <h2>Turn Metrics</h2>
          <div class="metric"><span>STT</span><strong id="metricStt">-</strong></div>
          <div class="metric"><span>TTS</span><strong id="metricTts">-</strong></div>

          <h2 class="log-title">Recent Events</h2>
          <div id="events" class="events"></div>
        </aside>
      </section>

      <button id="expandBtn" class="expand-btn" title="Expand/collapse conversation">
        Show conversation
      </button>
    </main>

    <script src="./renderer.js"></script>
  </body>
  </html>
